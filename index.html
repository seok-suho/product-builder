<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA Player Showcase</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container">
            <h1>NBA STARS</h1>
            <div class="search-box">
                <input type="text" id="player-search" placeholder="Search players by name...">
            </div>
        </div>
    </header>

    <main class="container">
        <div id="player-grid" class="player-grid">
            <!-- Cards will be injected here by JS -->
        </div>
    </main>

    <section class="contact-section container">
        <div class="contact-card">
            <h2>제휴 문의</h2>
            <p>협업 및 제휴 제안을 기다립니다.</p>
            <form action="https://formspree.io/f/xnjojovg" method="POST">
                <div class="form-group">
                    <label for="name">성함</label>
                    <input type="text" id="name" name="name" placeholder="홍길동" required>
                </div>
                <div class="form-group">
                    <label for="email">이메일 주소</label>
                    <input type="email" id="email" name="_replyto" placeholder="example@email.com" required>
                </div>
                <div class="form-group">
                    <label for="company">회사명/소속</label>
                    <input type="text" id="company" name="company" placeholder="회사명">
                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea id="message" name="message" rows="5" placeholder="문의하실 내용을 입력해주세요." required></textarea>
                </div>
                <button type="submit" class="submit-btn">보내기</button>
            </form>
        </div>
    </section>

    <section class="comments-section container">
        <div id="disqus_thread"></div>
        <script>
            /**
            *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
            *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables    */
            /*
            var disqus_config = function () {
            this.page.url = PAGE_URL;  // Replace PAGE_URL with your page's canonical URL variable
            this.page.identifier = PAGE_IDENTIFIER; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
            };
            */
            (function() { // DON'T EDIT BELOW THIS LINE
            var d = document, s = d.createElement('script');
            s.src = 'https://productbuilder-1udpqy9kaj.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
            })();
        </script>
        <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </section>

    <footer>
        <p>&copy; 2026 NBA Showcase. For Educational Purposes.</p>
    </footer>

    <script src="main.js"></script>
</body>
</html>
